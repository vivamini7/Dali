services:
  - type: web
    name: dalibaba-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: GUEST_DAILY_IMAGE_LIMIT
        value: "5"
      - key: FREE_DAILY_IMAGE_LIMIT
        value: "10"
      - key: PAID_DAILY_IMAGE_LIMIT
        value: "100"
      - key: APPLE_SHARED_SECRET
        sync: false
      - key: GOOGLE_PACKAGE_NAME
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
